apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: azure-secret-store
  namespace: default
  annotations:
    ## Add this annotation to disable controller warning events for unmaintained stores
    external-secrets.io/disable-maintenance-checks: "true"
spec:

  # Used to select the correct ESO controller (think: ingress.ingressClassName)
  # The ESO controller is instantiated with a specific controller name
  # and filters ES based on this property
  # Optional
  # controller: dev

  # You can specify retry settings for the http connection
  # these fields allow you to set a maxRetries before failure, and
  # an interval between the retries.
  # Current supported providers: AWS, Hashicorp Vault, IBM, Doppler
  retrySettings:
    maxRetries: 1
    retryInterval: "10s"

  # provider field contains the configuration to access the provider
  # which contains the secret exactly one provider must be configured.
  provider:
    azurekv:
      authType: "ServicePrincipal"
      vaultUrl: https://vishnukv001.vault.azure.net/
      tenantId: 7bc11121-932a-4343-9dc9-7fa7fbbd8ca3
      authSecretRef:
        clientId:
          name: azure-kv-sp-secret
          key: clientid
          namespace: default
        clientSecret:
          name: azure-kv-sp-secret
          key: clientsecret
          namespace: default
